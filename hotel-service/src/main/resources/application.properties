spring.application.name=hotel-service
server.port=8082

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hoteldb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:change-me}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Eureka Resilience Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.enabled=true

# Eureka Connection Timeouts
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-service-url-poll-interval-seconds=5

# Graceful Shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s
server.shutdown=graceful

