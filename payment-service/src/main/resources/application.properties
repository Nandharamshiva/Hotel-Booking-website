spring.application.name=payment-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=adeeb@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Eureka Connection Timeouts
eureka.client.eureka-server-read-timeout-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-service-url-poll-interval-seconds=5

# Graceful Shutdown
spring.lifecycle.timeout-per-shutdown-phase=30s
server.shutdown=graceful

# Mail Configuration (Simulation/Dummy MailHog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
