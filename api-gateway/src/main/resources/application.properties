spring.application.name=api-gateway

server.port=8085

# Gateway Routes
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.mvc.routes[2].id=hotel-service-hotels
spring.cloud.gateway.mvc.routes[2].uri=lb://HOTEL-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/hotels/**

spring.cloud.gateway.mvc.routes[3].id=hotel-service-rooms
spring.cloud.gateway.mvc.routes[3].uri=lb://HOTEL-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/rooms/**

spring.cloud.gateway.mvc.routes[4].id=booking-service
spring.cloud.gateway.mvc.routes[4].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/bookings/**

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT
jwt.secret=7a9f3c2e8b1d4f6a0e5c8b2d7f1a4e9c3b6d0f5a8e2c7b4d1f6a3e0c9b5d8f2a
jwt.expiration=86400000
