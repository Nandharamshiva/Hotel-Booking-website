spring.application.name=user-service
server.port=8081

#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT
jwt.secret=${JWT_SECRET:change-this-jwt-secret-before-prod}
jwt.expiration=86400000

# Google OAuth
google.client-id=687699714440-1ovomct1h8fs317i9tjm2s3p5rj8qr2p.apps.googleusercontent.com
google.client-secret=${GOOGLE_CLIENT_SECRET:}